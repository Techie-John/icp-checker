<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>ICP Checker — Settings</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="settings-page">
  <div class="header">
    <span class="logo">ICP Checker — Settings</span>
  </div>

  <div class="settings-form">
    <label for="api-key">Groq API Key</label>
    <input
      type="password"
      id="api-key"
      placeholder="gsk_..."
    />
    <small>Get a free key at <a href="https://console.groq.com" target="_blank">console.groq.com</a></small>

    <label for="icp">Your Ideal Client Profile</label>
    <textarea
      id="icp"
      rows="6"
      placeholder="e.g. Early-stage SaaS founders with a live product but under 500 users. Struggling with organic user acquisition. Based in US, UK, or Nigeria. No big marketing budget."
    ></textarea>
    <small>Be specific — the more detail, the better the analysis.</small>

    <button id="save-btn" class="save-btn">Save Settings</button>
    <p id="save-msg" class="save-msg hidden">✅ Saved!</p>
  </div>

  <script src="settings.js"></script>
</body>
</html>
